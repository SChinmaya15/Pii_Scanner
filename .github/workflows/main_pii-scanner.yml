name: Build/Deploy Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./PiiScanner.API/PiiScanner.API.csproj

      - name: Build
        run: dotnet build ./PiiScanner.API/PiiScanner.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./PiiScanner.API/PiiScanner.API.csproj --configuration Release --output ./publish

      - name: Verify Publish Output
        run: ls -la ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./publish

      - name: Verify Downloaded Files
        run: ls -la ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D4D18B65CB404C1894F380DB3D23EFF6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C687DD131974B469FECBA9E5DADF558 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DD3D7472928A4B5E9E21FEE2CCE703B3 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: pii-scanner
          package: ./publish
